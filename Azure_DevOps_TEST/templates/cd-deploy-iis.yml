# =============================================================================
# Template CD para .NET Core desplegado en IIS
# =============================================================================
# Uso: descargar artefacto, backup, deploy a IIS, inyectar secretos, health check
# Referencia: Manual Azure DevOps — Sección 12, Apéndice A
#             Guía Web Deploy — guia-web-deploy-iis.md
#
# Modos de deploy:
#   useWebDeploy: true  → msdeploy.exe via WMSVC (sin admin local)
#   useWebDeploy: false → xcopy + appcmd (requiere admin local)
# =============================================================================

parameters:
  - name: environment
    type: string
  - name: pool
    type: string
  - name: deployPath
    type: string
  - name: variableGroup
    type: string
  - name: artifactName
    type: string
    default: 'WeatherApp'
  - name: backupPath
    type: string
    default: 'C:\deploy-backups\WeatherApp'
  - name: useWebDeploy
    type: boolean
    default: true
  - name: msdeployPath
    type: string
    default: 'C:\Program Files\IIS\Microsoft Web Deploy V3\msdeploy.exe'
  - name: healthCheckEndpoint
    type: string
    default: '/health'
  - name: healthCheckRetries
    type: number
    default: 3
  - name: enableAutoRollback
    type: boolean
    default: true
  - name: maxBackups
    type: number
    default: 5

steps:
  # ---------------------------------------------------------------------------
  # Paso 1: Descargar artefacto inmutable construido en CI
  # ---------------------------------------------------------------------------
  - download: current
    artifact: '${{ parameters.artifactName }}-$(Build.BuildNumber)-$(Build.SourceBranchName)'
    displayName: '📥 Descargar Artefacto'

  # ---------------------------------------------------------------------------
  # Paso 2: Backup pre-deploy
  # ---------------------------------------------------------------------------
  - powershell: |
      $deployPath = "${{ parameters.deployPath }}"
      $backupPath = "${{ parameters.backupPath }}"
      $timestamp  = Get-Date -Format "yyyyMMdd-HHmmss"
      $backupDir  = Join-Path $backupPath "backup-$timestamp"

      if (Test-Path $deployPath) {
          $itemCount = (Get-ChildItem $deployPath -Recurse -File -ErrorAction SilentlyContinue).Count
          if ($itemCount -gt 0) {
              New-Item -ItemType Directory -Path $backupDir -Force | Out-Null
              Copy-Item -Path "$deployPath\*" -Destination $backupDir -Recurse -Force
              Write-Host "✅ Backup creado: $backupDir ($itemCount archivos)"
              Write-Host "##vso[task.setvariable variable=LastBackupPath]$backupDir"
          } else {
              Write-Host "⚠️ Carpeta de deploy vacía — omitiendo backup"
              Write-Host "##vso[task.setvariable variable=LastBackupPath]"
          }
      } else {
          Write-Host "⚠️ Carpeta de deploy no existe aún — primer deploy"
          Write-Host "##vso[task.setvariable variable=LastBackupPath]"
      }
    displayName: '💾 Backup Pre-Deploy'

  # ---------------------------------------------------------------------------
  # Paso 3: Limpiar backups antiguos
  # ---------------------------------------------------------------------------
  - powershell: |
      $backupPath = "${{ parameters.backupPath }}"
      $maxBackups = ${{ parameters.maxBackups }}

      if (Test-Path $backupPath) {
          $backups  = Get-ChildItem $backupPath -Directory | Sort-Object CreationTime -Descending
          $toDelete = $backups | Select-Object -Skip $maxBackups
          if ($toDelete) {
              $toDelete | ForEach-Object {
                  Write-Host "  Eliminando: $($_.Name)"
                  Remove-Item $_.FullName -Recurse -Force
              }
              Write-Host "Backups retenidos: $maxBackups"
          }
      } else {
          New-Item -ItemType Directory -Path $backupPath -Force | Out-Null
          Write-Host "Directorio de backups creado: $backupPath"
      }
    displayName: '🧹 Limpiar Backups Antiguos'
    continueOnError: true

  # ---------------------------------------------------------------------------
  # Paso 4: Verificar sitio IIS existe (ambos modos)
  # ---------------------------------------------------------------------------
  - powershell: |
      $appcmd = "$env:WinDir\System32\inetsrv\appcmd.exe"
      $site   = "$(WebsiteName)"

      $exists = & $appcmd list site /name:"$site" 2>$null
      if ($exists) {
          Write-Host "✅ Sitio '$site' encontrado en IIS"
          Write-Host "##vso[task.setvariable variable=SiteExists]true"
      } else {
          Write-Host "##vso[task.logissue type=warning]Sitio '$site' no existe en IIS."
          Write-Host "Ejecutar bootstrap/setup-iis-server.ps1 como Admin."
          Write-Host "Ver: DevOps/guia-web-deploy-iis.md — Sección 8"
          Write-Host "##vso[task.setvariable variable=SiteExists]false"
          exit 1
      }
    displayName: '🔍 Verificar sitio IIS existe'

  # ===========================================================================
  # MODO A: Web Deploy (msdeploy.exe via WMSVC — sin admin local)
  # ===========================================================================
  - ${{ if eq(parameters.useWebDeploy, true) }}:
    - powershell: |
        $msdeployExe  = "${{ parameters.msdeployPath }}"
        $site         = "$(WebsiteName)"
        $artifactPath = "$(Pipeline.Workspace)/${{ parameters.artifactName }}-$(Build.BuildNumber)-$(Build.SourceBranchName)"

        # Verificar msdeploy existe
        if (-not (Test-Path $msdeployExe)) {
            throw "msdeploy.exe no encontrado en: $msdeployExe. Instalar Web Deploy (ver guia-web-deploy-iis.md Sección 2)"
        }

        Write-Host "============================================="
        Write-Host "  DEPLOY CON WEB DEPLOY (MSDeploy)"
        Write-Host "============================================="
        Write-Host "  Sitio:     $site"
        Write-Host "  Artefacto: $artifactPath"
        Write-Host "  Modo:      WMSVC (sin admin local)"
        Write-Host "============================================="

        # Construir los argumentos de forma segura para PowerShell
        $msdeployArgs = @(
            "-verb:sync",
            "-source:contentPath=`"$artifactPath`"",
            # AQUÍ ESTÁ LA CORRECCIÓN CLAVE: ?site=$site
            "-dest:contentPath=`"$site`",computerName=`"https://localhost:8172/msdeploy.axd?site=$site`",userName=`"$env:WebDeployUser`",password=`"$env:WebDeployPassword`",authType=`"Basic`"",
            "-enableRule:AppOffline",
            "-allowUntrusted",
            "-retryAttempts:2",
            "-retryInterval:3000"
        )

        # Ejecutar el comando pasándole el arreglo de argumentos
        & $msdeployExe $msdeployArgs

        if ($LASTEXITCODE -ne 0) {
            throw "Web Deploy falló con código de salida: $LASTEXITCODE"
        }

        Write-Host ""
        Write-Host "✅ Deploy completado exitosamente via Web Deploy"
      displayName: '🚀 Deploy — Web Deploy (msdeploy.exe)'
      env:
        WebDeployUser: $(WebDeployUser)
        WebDeployPassword: $(WebDeployPassword)

  # ===========================================================================
  # MODO B: xcopy + appcmd (requiere admin local)
  # ===========================================================================
  - ${{ if eq(parameters.useWebDeploy, false) }}:
    # Detener sitio IIS
    - powershell: |
        $appcmd = "$env:WinDir\System32\inetsrv\appcmd.exe"
        $site   = "$(WebsiteName)"

        $exists = & $appcmd list site /name:"$site" 2>$null
        if ($exists) {
            & $appcmd stop site /site.name:"$site"
            Write-Host "✅ Sitio '$site' detenido"
        } else {
            Write-Host "⚠️ Sitio '$site' no encontrado"
        }
      displayName: '⏹️ Detener IIS Site (xcopy mode)'

    # Copiar archivos
    - powershell: |
        $deployPath   = "${{ parameters.deployPath }}"
        $artifactPath = "$(Pipeline.Workspace)/${{ parameters.artifactName }}-$(Build.BuildNumber)-$(Build.SourceBranchName)"

        Write-Host "============================================="
        Write-Host "  DEPLOY CON XCOPY"
        Write-Host "============================================="

        New-Item -ItemType Directory -Path $deployPath -Force | Out-Null
        Remove-Item "$deployPath\*" -Recurse -Force -ErrorAction SilentlyContinue
        Copy-Item -Path "$artifactPath\*" -Destination $deployPath -Recurse

        $fileCount = (Get-ChildItem $deployPath -Recurse -File).Count
        Write-Host "✅ $fileCount archivos desplegados en: $deployPath"
      displayName: '🚀 Deploy — xcopy/PowerShell'

    # Iniciar sitio IIS
    - powershell: |
        $appcmd = "$env:WinDir\System32\inetsrv\appcmd.exe"
        $site   = "$(WebsiteName)"
        $pool   = "$(AppPoolName)"

        # Iniciar App Pool
        & $appcmd start apppool /apppool.name:"$pool" 2>$null

        # Iniciar Sitio
        & $appcmd start site /site.name:"$site"
        Write-Host "✅ Sitio '$site' iniciado"
      displayName: '▶️ Iniciar IIS Site (xcopy mode)'

  # ---------------------------------------------------------------------------
  # Paso 5: Verificar Configuración
  # ---------------------------------------------------------------------------
  - powershell: |
      $appSettingsPath = "${{ parameters.deployPath }}\appsettings.json"
      if (Test-Path $appSettingsPath) {
          Write-Host "✅ appsettings.json encontrado en deploy path"
          Write-Host "Los secretos se inyectarán vía variables de entorno del Variable Group"
      }
    displayName: '⚙️ Verificar Configuración'

  # ---------------------------------------------------------------------------
  # Paso 6: Health Check + Auto-Rollback
  # ---------------------------------------------------------------------------
  - powershell: |
      $siteUrl        = "$(SiteUrl)"
      $endpoint       = "${{ parameters.healthCheckEndpoint }}"
      $fullUrl        = "${siteUrl}${endpoint}"
      $maxRetries     = ${{ parameters.healthCheckRetries }}
      $enableRollback = [System.Convert]::ToBoolean("${{ parameters.enableAutoRollback }}")
      $lastBackup     = "$(LastBackupPath)"
      $deployPath     = "${{ parameters.deployPath }}"
      $websiteName    = "$(WebsiteName)"

      Write-Host "============================================="
      Write-Host "  HEALTH CHECK"
      Write-Host "============================================="
      Write-Host "URL: $fullUrl"

      # Esperar inicio de la aplicación
      Start-Sleep -Seconds 5

      $success = $false
      for ($i = 1; $i -le $maxRetries; $i++) {
          try {
              Write-Host "Intento $i de $maxRetries..."
              $response = Invoke-WebRequest -Uri $fullUrl -UseBasicParsing -TimeoutSec 30 -ErrorAction Stop

              if ($response.StatusCode -eq 200) {
                  Write-Host "✅ Health check exitoso (HTTP $($response.StatusCode))"
                  $success = $true
                  break
              } else {
                  Write-Host "⚠️ HTTP $($response.StatusCode)"
              }
          } catch {
              Write-Host "❌ Intento $i falló: $($_.Exception.Message)"
              if ($i -lt $maxRetries) {
                  Write-Host "Esperando 10 segundos..."
                  Start-Sleep -Seconds 10
              }
          }
      }

      if (-not $success) {
          if ($enableRollback -and $lastBackup -and (Test-Path $lastBackup)) {
              Write-Host ""
              Write-Host "🔄 ROLLBACK AUTOMÁTICO"

              $appcmd = "$env:WinDir\System32\inetsrv\appcmd.exe"
              & $appcmd stop site /site.name:"$websiteName" 2>$null
              Start-Sleep -Seconds 3

              Remove-Item "$deployPath\*" -Recurse -Force -ErrorAction SilentlyContinue
              Copy-Item -Path "$lastBackup\*" -Destination $deployPath -Recurse -Force

              & $appcmd start site /site.name:"$websiteName" 2>$null
              Start-Sleep -Seconds 5

              throw "Deploy falló — rollback ejecutado desde: $lastBackup"
          } else {
              throw "Deploy falló — health check no pasó después de $maxRetries intentos"
          }
      }
    displayName: '🏥 Health Check + Auto-Rollback'

  # ---------------------------------------------------------------------------
  # Paso 7: Resumen del Deploy
  # ---------------------------------------------------------------------------
  - powershell: |
      Write-Host "============================================="
      Write-Host "  DEPLOY SUMMARY"
      Write-Host "============================================="
      Write-Host "Environment:     ${{ parameters.environment }}"
      Write-Host "Website:         $(WebsiteName)"
      Write-Host "Deploy Path:     ${{ parameters.deployPath }}"
      Write-Host "Site URL:        $(SiteUrl)"
      Write-Host "Artifact:        ${{ parameters.artifactName }}"
      Write-Host "Web Deploy:      ${{ parameters.useWebDeploy }}"
      Write-Host "Build Number:    $(Build.BuildNumber)"
      Write-Host "Deployed By:     $(Build.RequestedFor)"
      Write-Host "Timestamp:       $(Get-Date -Format 'yyyy-MM-dd HH:mm:ss')"
      Write-Host "============================================="
    displayName: '📋 Deploy Summary'
    condition: succeededOrFailed()
