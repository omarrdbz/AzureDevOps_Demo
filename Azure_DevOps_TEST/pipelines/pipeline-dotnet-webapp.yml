# Pipeline completo: CI + CD (Test → Prod)
# Aplicación: WeatherApp (.NET 10)
# Referencia: Manual Azure DevOps — Secciones 11, 12
#
# SECRETOS REQUERIDOS EN VARIABLE GROUPS:
#   vg-weatherapp-test / vg-weatherapp-prod
#     - ConnectionStrings__WeatherDb  🔒 (secreto)
#     - WeatherApi__ApiKey            🔒 (secreto)
#     - WeatherApi__BaseUrl
#     - WeatherApi__DefaultCity
#     - AppPoolName
#     - WebsiteName
#     - DeployPath
#     - SiteUrl

name: '$(Date:yyyyMMdd).$(Rev:r)'

trigger:
  branches:
    include:
      - main
      - develop
  paths:
    include:
      - Azure_DevOps_TEST/**
    exclude:
      - '**/*.md'

pr: none

# ──────────────────────────────────────────────
# STAGE 1: CI — Build, Test, Scan, Publish
# Agente: Microsoft-hosted (efímero)
# ──────────────────────────────────────────────
stages:
  - template: ../templates/stages-ci.yml
    parameters:
      buildConfiguration: 'Release'
      dotnetVersion: '10.x'
      projectPath: 'Azure_DevOps_TEST/Azure_DevOps_TEST.csproj'
      artifactName: 'WeatherApp'

  # ──────────────────────────────────────────────
  # STAGE 2: CD — Deploy to Test
  # Agente: Self-hosted (Pool-Test)
  # Aprobación: Opcional
  # ──────────────────────────────────────────────
  - template: ../templates/stages-cd.yml
    parameters:
      environment: 'Test'
      pool: 'Pool-Test'
      websiteName: 'WeatherApp-Test'
      deployPath: 'C:\inetpub\wwwroot\WeatherApp'
      variableGroup: 'vg-weatherapp-test'
      artifactName: 'WeatherApp'
      siteUrl: 'https://weatherapp-test.empresa.local'
      backupPath: 'C:\deploy-backups\WeatherApp'
      dependsOn: 'CI'

  # ──────────────────────────────────────────────
  # STAGE 3: CD — Deploy to Prod
  # Agente: Self-hosted (Pool-Prod)
  # Aprobación: OBLIGATORIA (configurada en Environment "Prod")
  # Branch Control: Solo desde main
  # ──────────────────────────────────────────────
  - template: ../templates/stages-cd.yml
    parameters:
      environment: 'Prod'
      pool: 'Pool-Prod'
      websiteName: 'WeatherApp-Prod'
      deployPath: 'C:\inetpub\wwwroot\WeatherApp'
      variableGroup: 'vg-weatherapp-prod'
      artifactName: 'WeatherApp'
      siteUrl: 'https://weatherapp.empresa.local'
      backupPath: 'C:\deploy-backups\WeatherApp'
      dependsOn: 'CD_Test'
      condition: "and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))"
