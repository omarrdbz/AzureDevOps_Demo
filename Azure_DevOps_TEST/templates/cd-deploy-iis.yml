# Template CD para .NET Core desplegado en IIS
# Uso: descargar artefacto, backup, deploy a IIS, inyectar secretos, health check
# Referencia: Manual Azure DevOps — Sección 12 y Apéndice A

parameters:
  - name: environment
    type: string
  - name: pool
    type: string
  - name: websiteName
    type: string
  - name: deployPath
    type: string
  - name: variableGroup
    type: string
  - name: artifactName
    type: string
    default: 'WeatherApp'
  - name: siteUrl
    type: string
  - name: backupPath
    type: string
    default: 'C:\deploy-backups\WeatherApp'

steps:
  # Descargar artefacto inmutable construido en CI
  - download: current
    artifact: '${{ parameters.artifactName }}-$(Build.BuildNumber)-$(Build.SourceBranchName)'
    displayName: 'Descargar Artefacto'

  # Backup pre-deploy — Referencia: Manual Sección 16
  - powershell: |
      $backupDir = "${{ parameters.backupPath }}\backup-$(Get-Date -Format 'yyyyMMdd-HHmmss')"
      Write-Host "Creando backup en: $backupDir"
      if (Test-Path "${{ parameters.deployPath }}") {
          New-Item -ItemType Directory -Path $backupDir -Force
          Copy-Item -Path "${{ parameters.deployPath }}\*" -Destination $backupDir -Recurse -ErrorAction SilentlyContinue
          Write-Host "✅ Backup completado"
      } else {
          Write-Host "⚠️ Carpeta de deploy no existe aún, omitiendo backup"
      }
    displayName: 'Backup Pre-Deploy'

  # Limpieza de backups antiguos — mantener solo últimos 5
  - powershell: |
      $backupDir = "${{ parameters.backupPath }}"
      if (Test-Path $backupDir) {
          $backups = Get-ChildItem $backupDir | Sort-Object CreationTime -Descending
          $backups | Select-Object -Skip 5 | Remove-Item -Recurse -Force
          Write-Host "Backups retenidos: $($backups.Count - ($backups.Count - 5))"
      }
    displayName: 'Limpiar Backups Antiguos'
    continueOnError: true

  # Detener sitio IIS
  - powershell: |
      Import-Module WebAdministration
      $site = "${{ parameters.websiteName }}"
      if (Get-Website -Name $site -ErrorAction SilentlyContinue) {
          Stop-WebSite -Name $site
          Write-Host "✅ Sitio '$site' detenido"
      } else {
          Write-Host "⚠️ Sitio '$site' no encontrado, se creará después del deploy"
      }
    displayName: 'Detener IIS Site'

  # Deploy — copiar artefacto
  - powershell: |
      $deployPath = "${{ parameters.deployPath }}"
      $artifactPath = "$(Pipeline.Workspace)/${{ parameters.artifactName }}-$(Build.BuildNumber)-$(Build.SourceBranchName)"
      
      New-Item -ItemType Directory -Path $deployPath -Force
      Remove-Item "$deployPath\*" -Recurse -Force -ErrorAction SilentlyContinue
      Copy-Item -Path "$artifactPath\*" -Destination $deployPath -Recurse
      Write-Host "✅ Artefacto desplegado en: $deployPath"
    displayName: 'Deploy a IIS'

  # Inyectar configuración desde Variable Group
  # Los secretos del Variable Group se inyectan como variables de entorno
  # ASP.NET Core los lee automáticamente con el prefijo adecuado
  - powershell: |
      $appSettingsPath = "${{ parameters.deployPath }}\appsettings.json"
      if (Test-Path $appSettingsPath) {
          Write-Host "✅ appsettings.json encontrado en deploy path"
          Write-Host "Los secretos se inyectarán vía variables de entorno del Variable Group"
      }
    displayName: 'Verificar Configuración'

  # Iniciar sitio IIS
  - powershell: |
      Import-Module WebAdministration
      $site = "${{ parameters.websiteName }}"
      if (Get-Website -Name $site -ErrorAction SilentlyContinue) {
          Start-WebSite -Name $site
          Write-Host "✅ Sitio '$site' iniciado"
      } else {
          Write-Host "❌ Sitio '$site' no encontrado"
          exit 1
      }
    displayName: 'Iniciar IIS Site'

  # Health Check + Auto-Rollback — Referencia: Manual Sección 16.4
  - powershell: |
      try {
          Start-Sleep -Seconds 5
          $response = Invoke-WebRequest -Uri "${{ parameters.siteUrl }}/health" -UseBasicParsing -TimeoutSec 30
          if ($response.StatusCode -ne 200) {
              throw "Health check failed: $($response.StatusCode)"
          }
          Write-Host "✅ Health check passed — Status: $($response.StatusCode)"
      } catch {
          Write-Host "❌ Health check failed — iniciando rollback"
          $lastBackup = Get-ChildItem "${{ parameters.backupPath }}" | Sort-Object CreationTime -Descending | Select-Object -First 1
          if ($lastBackup) {
              Import-Module WebAdministration
              Stop-WebSite -Name "${{ parameters.websiteName }}"
              Remove-Item "${{ parameters.deployPath }}\*" -Recurse -Force
              Copy-Item "$($lastBackup.FullName)\*" -Destination "${{ parameters.deployPath }}" -Recurse
              Start-WebSite -Name "${{ parameters.websiteName }}"
              throw "Deploy failed — rolled back to $($lastBackup.Name)"
          } else {
              throw "Deploy failed — no backup available for rollback"
          }
      }
    displayName: 'Health Check + Auto-Rollback'
