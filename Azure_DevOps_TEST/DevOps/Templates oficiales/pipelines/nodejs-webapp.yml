# Pipeline ejemplo: aplicación web Node.js

name: '$(Date:yyyyMMdd).$(Rev:r)'

trigger:
  branches:
    include:
      - main
  paths:
    include:
      - src/**
    exclude:
      - '**/*.md'
      - '**/.gitignore'

pr: none

stages:
  - template: ../templates/stage-ci.yml
    parameters:
      technology: 'nodejs'
      vmImage: 'ubuntu-latest'
      nodeVersion: '20.x'
      packageManager: 'npm'
      buildScript: 'build'
      testScript: 'test'
      outputFolder: 'dist'
      artifactName: 'MiAppNode'
      enableSnykSCA: true
      snykServiceConnection: 'sc-snyk'
      snykFailOnIssues: true
      enableNativeDependencyScan: true
      enableFortifyPackage: true
      fortifyBuildId: 'MiAppNode'

  - template: ../templates/stage-sast.yml
    parameters:
      pool: 'Pool-Test'
      variableGroup: 'vg-fortify'
      dependsOn: 'CI'
      artifactName: 'MiAppNode'
      fortifyScanCentralUrl: 'https://fortify-sc.empresa.local/scancentral-ctrl'
      fortifyScanCentralToken: $(FortifyScanCentralToken)
      fortifySSCUrl: 'https://fortify-ssc.empresa.local/ssc'
      fortifySSCAuthToken: $(FortifySSCToken)
      fortifyAppName: 'MiAppNode'
      fortifyAppVersion: '1.0'
      qualityGateEnabled: true
      qualityGateMaxCritical: 0
      qualityGateMaxHigh: 0

  - template: ../templates/stage-cd.yml
    parameters:
      environment: 'Test'
      pool: 'Pool-Test'
      variableGroup: 'vg-miapp-test'
      artifactName: 'MiAppNode'
      deployPath: 'C:\inetpub\wwwroot\MiAppNode'
      backupPath: 'C:\deploy-backups\MiAppNode'
      healthCheckEndpoint: '/'
      dependsOn: 'SAST'
      enableSnykApiWebDAST: true
      snykApiWebTargetId: '<TARGET_ID>'
      snykApiWebScanProfile: 'normal'
      snykApiWebSeverityThreshold: 'HIGH'
      snykApiWebFailOnIssues: true

  - template: ../templates/stage-security-review.yml
    parameters:
      environment: 'SecurityReview'
      pool: 'Pool-Test'
      dependsOn: 'CD_Test'
      applicationName: 'MiAppNode'
      minimumBlockingSeverity: 'High'

  - template: ../templates/stage-uat.yml
    parameters:
      environment: 'UAT'
      pool: 'Pool-Test'
      dependsOn: 'Security_Review'
      applicationName: 'MiAppNode'

  - template: ../templates/stage-cd.yml
    parameters:
      environment: 'Prod'
      pool: 'Pool-Prod'
      variableGroup: 'vg-miapp-prod'
      artifactName: 'MiAppNode'
      deployPath: 'C:\inetpub\wwwroot\MiAppNode'
      backupPath: 'C:\deploy-backups\MiAppNode'
      healthCheckEndpoint: '/'
      dependsOn: 'UAT'
      condition: "and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))"
      enableSnykApiWebDAST: false
